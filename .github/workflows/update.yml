name: 공고 자동 수집

on:
  schedule:
    - cron: "0 22 * * *" # 매일 07:00 KST
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 공고 수집 및 필터링
        env:
          KSTARTUP_KEY: ${{ secrets.KSTARTUP_KEY }}
          BIZINFO_KEY: ${{ secrets.BIZINFO_KEY }}
        run: node collect.mjs

      - name: 데이터 커밋
        run: |
          git config user.name "alcofix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/programs.json
          git diff --cached --quiet || (git commit -m "data: 공고 자동 업데이트 $(date -u -d '+9 hours' +'%Y-%m-%d')" && git push)
